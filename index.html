<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galeria de Imagens</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            color: #333;
            margin: 0;
            padding: 20px;
        }
        h1 {
            text-align: center;
            color: #1a1a1a;
            margin-bottom: 30px;
        }
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }
        .card {
            background: #ffffff;
            border-radius: 8px;
            padding: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: transform 0.2s ease-in-out;
        }
        .card:hover {
            transform: translateY(-5px);
        }
        .card img {
            max-width: 100%;
            height: auto;
            max-height: 200px;
            object-fit: cover;
            border-radius: 4px;
            margin-bottom: 15px;
            border: 1px solid #eee;
        }
        .card .filename {
            font-size: 0.9em;
            color: #666;
            margin-bottom: 10px;
            word-break: break-all;
            text-align: center;
        }
        button {
            background-color: #007bff;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: background-color 0.3s;
            width: 100%;
        }
        button:hover {
            background-color: #0056b3;
        }
        
        /* Notificação (Toast) */
        #toast {
            visibility: hidden;
            min-width: 250px;
            background-color: #333;
            color: #fff;
            text-align: center;
            border-radius: 5px;
            padding: 16px;
            position: fixed;
            z-index: 1000;
            left: 50%;
            bottom: 30px;
            transform: translateX(-50%);
            font-size: 16px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        #toast.show {
            visibility: visible;
            animation: fadein 0.5s, fadeout 0.5s 2.5s;
        }
        @keyframes fadein {
            from {bottom: 0; opacity: 0;}
            to {bottom: 30px; opacity: 1;}
        }
        @keyframes fadeout {
            from {bottom: 30px; opacity: 1;}
            to {bottom: 0; opacity: 0;}
        }
    </style>
</head>
<body>

    <h1>Galeria de Imagens</h1>

    <div class="gallery" id="gallery">
        <!-- As imagens serão inseridas dinamicamente aqui pelo JavaScript -->
    </div>

    <!-- Elemento de notificação -->
    <div id="toast">Link copiado para a área de transferência!</div>

    <script>
        // Array com os nomes das imagens
        const arquivos = [
            // <!-- IMAGES_START -->
            'imagens/albano_catumbela.webp',
            'imagens/augusto_boio.webp',
            'imagens/celina_cambolo.webp',
            'imagens/david_boio.webp',
            'imagens/evaristo_adriano.webp',
            'imagens/gizela_guilherme.webp',
            'imagens/hilaria_da_costa.webp',
            'imagens/ibrahim_kalei.webp',
            'imagens/ines_cirilo.webp',
            'imagens/jacinto.webp',
            'imagens/joao_mateus.webp',
            'imagens/manuel_mendonca.webp',
            'imagens/tito_segunda.webp'
            // <!-- IMAGES_END -->
        ];

        // Função que reconhece todas as imagens com a extensão .webp e lista na galeria
        function carregarGaleria() {
            const gallery = document.getElementById('gallery');
            gallery.innerHTML = ''; // Limpa o conteúdo atual

            // Filtra o array para garantir que apenas .webp sejam carregados
            const imagensWebp = arquivos.filter(arquivo => arquivo.toLowerCase().endsWith('.webp'));

            imagensWebp.forEach(filename => {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <img src="${filename}" alt="${filename}">
                    <div class="filename">${filename}</div>
                    <button onclick="copyLink('${filename}')">Copiar Link</button>
                `;
                gallery.appendChild(card);
            });
        }

        // Executa a função ao carregar a página
        window.addEventListener('DOMContentLoaded', carregarGaleria);

        function copyLink(filename) {
            // Cria um objeto URL para resolver o caminho absoluto baseado na URL atual do servidor
            const fileUrl = new URL(filename, window.location.href).href;

            // Usa a API de Clipboard para copiar
            navigator.clipboard.writeText(fileUrl).then(() => {
                showToast();
            }).catch(err => {
                console.error('Erro ao copiar o link: ', err);
                
                // Fallback para navegadores mais antigos
                const tempInput = document.createElement("input");
                tempInput.value = fileUrl;
                document.body.appendChild(tempInput);
                tempInput.select();
                document.execCommand("copy");
                document.body.removeChild(tempInput);
                showToast();
            });
        }

        function showToast() {
            const toast = document.getElementById("toast");
            toast.className = "show";
            setTimeout(function() {
                toast.className = toast.className.replace("show", "");
            }, 3000);
        }
    </script>
</body>
</html>
